name: Deploy to GitHub Pages

on:
  # Run on every push to the default branch
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress one finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The site lives at the repo root (static files, no build step)
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
